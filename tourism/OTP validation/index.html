<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>OTP App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>OTP verification</h2>
        <p>Please type verifictaion code sent to mobile number</p>
        <span id="mobile">(000) 000-0000</span>
        <p>The OTP will expire in <span id="expire">30</span>s</p>
        <div class="row">
            <input type="number" />
            <input type="number" disabled/>
            <input type="number" disabled/>
            <input type="number" disabled/>
        </div>
        <button type="button">Verify OTP</button>
        <p>
            Didn't receive code?
            <a href="javascript:void(0)" id="request" onclick="generateOTPs()">Request Again!</a>
        </p>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
