<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review your Booking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            background-color: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #002d62;
        }
        .booking-section, .guest-section, .special-request, .trip-secure {
            margin-bottom: 20px;
        }
        .booking-section {
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }
        .guest-section {
            display: flex;
            justify-content: space-between;
        }
        .section-title {
            font-size: 18px;
            color: #555;
            margin-bottom: 10px;
        }
        .room-details, .price-details {
            margin-bottom: 10px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="number"], input[type="email"], input[type="tel"], select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .summary-box {
            padding: 10px;
            background-color: #f0f8ff;
            border: 1px solid #d1d1d1;
            margin-bottom: 20px;
        }
        .summary-box span {
            font-weight: bold;
        }
        .price-details p {
            margin: 0;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .guest-form {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Review your Booking</h2>
    <!-- Add this section in the .container div -->
<div class="hotel-image-section">
    <h3>Hotel Image</h3>
    <img id="hotel-image" src="" alt="Hotel Image" style="width:100%; max-height:400px; object-fit:cover; border-radius:10px; box-shadow:0 6px 12px rgba(0,0,0,0.2);">
</div>
    <!-- Booking Details Section -->
    <div class="booking-section">
        <div class="section-title">Booking Details</div>
        <div class="summary-box">
            <p>Hotel-Name: <span id="hname"></span></p>
            <p>Location: <span id="loc"></span></p>
            <p>Check-in: <span id="checkin-date"></span></p>
            <p>Check-out: <span id="checkout-date"></span></p>
            <p>Duration: <span id="total-days"></span> nights</p>
        </div>
        <marquee bgcolor="yellow">Enter Valid information </marquee>
    </div>

    <!-- Room Details Section -->
    <div class="guest-section">
        <div>
            <div class="section-title">Room Details</div>
            <div class="room-details">
                <label>Room Type</label>
                <input type="text" id="room-type" value="Normal" readonly>
            </div>
            <div class="guest-details">
                <p>Adults: <span id="adults"></span></p>
                <p>Children: <span id="children"></span></p>
            </div>
        </div>
        <div>
            <div class="section-title">Price Breakup</div>
            <div class="price-details">
                <p>Room Price: ₹<span id="cost"></span></p>
                <p>Other Charges: ₹900</p>
                <p>Total: ₹<span id="total-price"></span></p>
            </div>
        </div>
    </div>

    <!-- Dynamic Guest Forms Section -->
    <div id="guestForms"></div>

    <!-- Confirm Details Button -->
    <button id="confirm-details">Confirm Details</button>
    

    <!-- Pay Now Button -->
    <div class="pay-now"><marquee bgcolor="yellow" height="25">Hotel taxes were included in the form of other charges.</marquee>

        <button id="pay-now" style="margin-left:550px; height:50px; width:150px; font-size: large;">Pay Now</button>
    </div>
</div>

<script>
    // Function to calculate the difference in days between two dates
    function calculateDays(checkin, checkout) {
        const checkinDate = new Date(checkin);
        const checkoutDate = new Date(checkout);
        const timeDiff = checkoutDate - checkinDate;
        return timeDiff / (1000 * 3600 * 24); // Convert milliseconds to days
    }

    // Get parameters from URL
    const urlParams = new URLSearchParams(window.location.search);
    const loc = urlParams.get('location');
    const checkin = urlParams.get('checkin');
    const checkout = urlParams.get('checkout');
    const adults = parseInt(urlParams.get('adult')) || 0;
    const children = parseInt(urlParams.get('child')) || 0;
    const cost = urlParams.get('cost');
    const hname = urlParams.get('hname');
    const imageUrl=urlParams.get('imageUrl');
    // Update the page with the passed values
    document.getElementById('loc').innerText = loc;
    document.getElementById('hname').innerText = hname;
    document.getElementById('checkin-date').innerText = checkin;
    document.getElementById('checkout-date').innerText = checkout;
    document.getElementById('adults').innerText = adults;
    document.getElementById('children').innerText = children;
    document.getElementById('hotel-image').src= imageUrl;
    // Calculate and display the total number of days
    const totalDays = calculateDays(checkin, checkout);
    document.getElementById('total-days').innerText = totalDays;

    // Display the room price and total price
    document.getElementById('cost').innerText = cost;
    const totalPrice = parseInt(cost) + 900; // Adding ₹500 for fees
    document.getElementById('total-price').innerText = totalPrice;

    // Dynamically create and append guest forms based on adults and children count
    const guestForms = document.getElementById('guestForms');
    const adultForms = [];
    const childForms = [];

    function createAdultGuestForm(index) {
        const guestForm = document.createElement('div');
        guestForm.classList.add('guest-form');
        guestForm.innerHTML = `
            <h3>Adult ${index + 1} Details</h3>
            <label>Title</label>
            <select class="title">
                <option value="Mr">Mr</option>
                <option value="Ms">Ms</option>
            </select>

            <label>First Name</label>
            <input type="text" class="adult-first-name" placeholder="First Name" required>

            <label>Last Name</label>
            <input type="text" class="adult-last-name" placeholder="Last Name" required>

            <label>Email</label>
            <input type="email" class="adult-email" placeholder="Email" required>

            <label>Contact Number (10 digits)</label>
            <input type="tel" class="adult-phone" placeholder="Contact Number" required pattern="[0-9]{10}">
            <span class="error phone-error" style="color:red"></span>
        `;
        guestForms.appendChild(guestForm);
        adultForms.push(guestForm);
    }

    function createChildGuestForm(index) {
        const guestForm = document.createElement('div');
        guestForm.classList.add('guest-form');
        guestForm.innerHTML = `
            <h3>Child ${index + 1} Details</h3>
            <label>First Name</label>
            <input type="text" class="child-first-name" placeholder="First Name" required>

            <label>Last Name</label>
            <input type="text" class="child-last-name" placeholder="Last Name" required>

            <label>Age (<18)</label>
            <input type="number" class="child-age" placeholder="Age" min="1" max="17" required>
            <span class="error age-error" style="color:red"></span>
        `;
        guestForms.appendChild(guestForm);
        childForms.push(guestForm);
    }

    // Create adult guest forms
    for (let i = 0; i < adults; i++) {
        createAdultGuestForm(i);
    }

    // Create child guest forms
    for (let i = 0; i < children; i++) {
        createChildGuestForm(i);
    }

    // Validation for adults
    function validateAdults() {
        let valid = true;
        adultForms.forEach((form) => {
            const phone = form.querySelector('.adult-phone').value;
            const phoneError = form.querySelector('.phone-error');
            if (!phone.match(/^[0-9]{10}$/)) {
                phoneError.innerText = "Invalid phone number. Must be 10 digits.";
                valid = false;
            } else {
                phoneError.innerText = ""; // Clear error message if valid
            }
        });
        return valid;
    }

    // Validation for children
    function validateChildren() {
        let valid = true;
        childForms.forEach((form) => {
            const age = form.querySelector('.child-age').value;
            const ageError = form.querySelector('.age-error');
            if (age < 1 || age > 17) {
                ageError.innerText = "Age must be between 1 and 17.";
                valid = false;
            } else {
                ageError.innerText = ""; // Clear error message if valid
            }
        });
        return valid;
    }
    document.getElementById('pay-now').disabled= true;
    // Confirm Details button functionality
    document.getElementById('confirm-details').onclick = function() {
        const adultValid = validateAdults();
        const childValid = validateChildren();

        const confirmButton = document.getElementById('confirm-details');

        if (adultValid && childValid) {
            confirmButton.innerText = "Confirmed"; // Change button text
            confirmButton.style.backgroundColor = "green"; // Change button color
            confirmButton.style.color = "white"; // Change text color to white
            confirmButton.disabled = true; // Disable button to prevent multiple confirmations
            document.getElementById('pay-now').disabled= false;
            alert("Guest details confirmed!");
        } else {
            alert("Please fix the errors in the form before confirming.");
        }
    };

   // Pay Now button functionality
document.getElementById('pay-now').onclick = function() {
    const adultValid = validateAdults();
    const childValid = validateChildren();

    if (adultValid && childValid) {
        // Collect necessary data for redirection
        const hname = document.getElementById('hname').innerText;
        const checkin = document.getElementById('checkin-date').innerText;
        const checkout = document.getElementById('checkout-date').innerText;
        const adults = document.getElementById('adults').innerText;
        const children = document.getElementById('children').innerText;
        const totalPrice = document.getElementById('total-price').innerText;
        // Collect emails and phone numbers of adults
        const adultEmails = Array.from(document.querySelectorAll('.adult-email')).map(input => input.value).join(',');
        const adultPhones = Array.from(document.querySelectorAll('.adult-phone')).map(input => input.value).join(',');

        // Construct the URL with query parameters
        const url = 'payment2.html?hname=' + encodeURIComponent(hname) +
            '&checkin=' + encodeURIComponent(checkin) +
            '&checkout=' + encodeURIComponent(checkout) +
            '&adults=' + encodeURIComponent(adults) +
            '&children=' + encodeURIComponent(children) +
            '&totalPrice=' + encodeURIComponent(totalPrice) +
            '&adultEmails=' + encodeURIComponent(adultEmails) +
            '&adultPhones=' + encodeURIComponent(adultPhones)+
            '&imageUrl=' +encodeURIComponent(imageUrl);
        // Redirect to the payment page
        window.location.href = url;
    } else {
        alert("Please fix the errors in the form before proceeding to payment.");
    }
};
</script>
</body>
</html>
