<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Register</title>
	<link rel="icon" type="image/png" sizes="32x32" href="images/2.png">
	<link rel="stylesheet" href="unkcss.css">
	<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500&display=swap" rel="stylesheet">
</head>
<body>


	<div class="main-div">
		<div class="logo">
			<h1>INDIAN TOURISM</h1>
		</div>
			<center><h2 class="para">Travel Bookings</h2></center>
		<div class="buttons">
			<div>
				<button class="btn" id="btn1">Airway</button>
			</div>

			<div>
				<button class="btn" id="btn2">Railway</button>
			</div>
			<div>
				<button class="btn" id="btn3">Roadway</button>
			</div>
		</div>
		<div class="main-btn">
			<button class="btn2" id="btn4">select</button>
		  </div>

		<div class="login-div">
			<p class="login-para">
				Already have an Account? <a href="loginpage - Copy.html"  class="login">login</a>
			</p>
		</div>
	</div>
</body>
<script>
	let button1 = document.getElementById("btn1");
	let button2 = document.getElementById("btn2");
	let button3 = document.getElementById("btn3");
	let button4 = document.getElementById("btn4");

	button1.onclick = function(){
		button1.style.borderColor = "#df3b09";
		button2.style.borderColor = "#121212";
		button3.style.borderColor = "#121212";
		button4.textContent = "select Airways";
		button4.style.backgroundColor = "#df3b09";
		button4.style.color = "white";
	//	button3.style.padding = "10px"
		button4.style.width = "150px";
		button4.style.cursor = "pointer";
		button4.onclick = function(){
			document.location.href = "";
		}		
	}
	button2.onclick = function(){
		button2.style.borderColor = "#df3b09";
		button1.style.borderColor = "#121212";
		button3.style.borderColor = "#121212";
		button4.textContent = "Select Railways";
		button4.style.backgroundColor = "#df3b09";
		button4.style.color = "white";
		button4.style.width = "200px";
		button4.style.cursor = "pointer";
		button4.onclick = function(){
			document.location.href = "";
		}
	}
	button3.onclick = function(){
			button3.style.borderColor = "#df3b09";
			button1.style.borderColor = "#121212";
			button2.style.borderColor = "#121212";
			button4.textContent = "Select Roadways";
			button4.style.backgroundColor = "#df3b09";
			button4.style.color = "white";
			button4.style.width = "200px";
			button4.style.cursor = "pointer";
			button4.onclick = function(){
				document.location.href = "";
			}
	}
</script>
</html>
