<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <title>Sterling Darjeeling</title>
    <style>
        /* Styling remains the same */
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ffefba, #ffffff);
            color: #333;
        }
        .navbar {
            display: flex;
            padding: 20px 20px;
            align-items: center;
            width: 97%; 
            background-color: #ada8908c;
        }
        .navbar a {
            text-decoration: none;
            padding: 10px 20px;
            color: white;
            border-radius: 20px;
        }
        .navbar a:hover {
            color: orangered;
            background-color: rgba(0, 0, 0, 0.4);
            box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease 0s;
        }
        .navbar a:active {
            background-color: rgba(0, 0, 0, 0.6);
        }
        .menubar {
            width: 100%;
        }
        .login-btn {
            float: right;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .hotel-image {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .hotel-image:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.7);
        }
        h2 {
            margin-top: 20px;
            font-size: 2rem;
            color: #f57c00;
        }
        .hotel-specs {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        .spec {
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            flex: 1;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }
        h3 {
            color: #333;
            font-size: 1.5rem;
        }
        .reviews {
            margin-top: 30px;
            text-align: center;
        }
        .stars {
            font-size: 1.5rem;
            color: gold;
        }
        .booking {
            margin-top: 40px;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }
        .booking label {
            display: block;
            margin-top: 15px;
            font-size: 1.1rem;
            color: #333;
        }
        input[type="date"], select, input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 1rem;
        }
        input[type="text"] {
            text-align: center;
            border: none;
            background-color: #f1f1f1;
            color: #f57c00;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .cost {
            margin-top: 20px;
            font-size: 1.8rem;
            color: #f57c00;
            text-align: center;
        }
        .cost small {
            font-size: 0.8rem;
            color: #666;
            margin-left: 5px;
        }
        .book-button {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            background-color: #f57c00;
            color: white;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .book-button:active {
            background-color: #e65100;
            transform: scale(0.85);
        }
    </style>
</head>
<body ng-app="myApp" ng-controller="myCtrl">

    <nav class="navbar">
        <div class="menubar">
            <a href="home.html">HOME</a>
            <a href="new1.html">ACCOMODATIONS</a>
            <a href="aboutus.html">ABOUT</a>
            <a href="help.html">HELP</a>
            <div class="login-btn" id="login-btn"><a href="loginpage - Copy.html">LOGIN</a></div>
        </div>
    </nav>

    <div ng-init="initadult=7030;hname='Sterling Darjeeling';location='Ghoom Monastery Road, Ghoom, 734102 Darjeeling, India'">
        <div class="container">
            <img src="../Images/darjiling/d--6.jpg" alt="Hotel Sterling" class="hotel-image" max-width="600px">

           <h2>{{hname}}</h2>
            <div class="hotel-specs">
                <div class="spec">
                    <h3>Location</h3>
                    <p>{{location}}</p>
                </div>
                <div class="spec">
                    <h3>Services</h3>
                    <p>Free Wi-Fi, Gym, Rooftop Restaurant, Swimming Pool, 24/7 Room Service</p>
                </div>
            </div>

            <div class="reviews">
                <h3>Reviews</h3>
                <div class="stars">
                    <p>★★★★★</p>
                    <p style="color:black">5 Star Rating</p>
                </div>
            </div>

            <div class="booking">
                <label for="city">City Location</label>
                <input type="text" id="location" value="Darjeeling" readonly>

                <label for="checkin">Check-in</label>
                <input type="date" id="checkin" ng-model="checkin">

                <label for="checkout">Check-out</label>
                <input type="date" id="checkout" ng-model="checkout">

                <label for="rooms">Rooms</label>
                <input type="number" id="rooms" min="1" value="1" ng-model="room">

                <label for="adults">Adults</label>
                <input type="number" id="adults" min="1" value="1" ng-model="adult">

                <label for="children">Children (0-17)</label>
                <input type="number" id="children" min="0" value="0" ng-model="child">

                <div class="cost">Estimated Cost: ₹<span ng-bind="(room*initadult+(adult*300)+(child*150))"></span><small>per day</small></div>
                <div class="cost">Estimated Cost: ₹<span ng-bind="(room*initadult+(adult*300)+(child*150))*calculateDays(checkin, checkout)"></span><small>per schedule</small></div>

                <button class="book-button" type="button" ng-click="passData()">Book Now</button>
            </div>
        </div>
    </div>

    <script>
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('checkin').setAttribute('min', today);
        document.getElementById('checkout').setAttribute('min', today);
        function calculateDays(checkin, checkout) {
            if (!checkin || !checkout) return 1;
            const checkinDate = new Date(checkin);
            const checkoutDate = new Date(checkout);
            const timeDiff = checkoutDate - checkinDate;
            const days = timeDiff / (1000 * 60 * 60 * 24);
            return days > 0 ? days : 1;
        }

        var app = angular.module("myApp", []);
        app.controller("myCtrl", function($scope) {
            $scope.calculateDays = calculateDays;
            $scope.passData = function() {
                const checkin = $scope.checkin;
                const checkout = $scope.checkout;
                const room = $scope.room;
                const adult = $scope.adult;
                const child = $scope.child;
                const cost = (room * $scope.initadult + (adult * 300) + (child * 150)) * calculateDays(checkin, checkout);
                const hname = $scope.hname;
                const location = $scope.location;
                const imageUrl = '../Images/darjiling/d--6.jpg';
        // Corrected URL concatenation
        const url = 'ant1.html?checkin=' + encodeURIComponent(checkin) + 
                    '&checkout=' + encodeURIComponent(checkout) + 
                    '&room=' + encodeURIComponent(room) + 
                    '&adult=' + encodeURIComponent(adult) + 
                    '&child=' + encodeURIComponent(child) + 
                    '&cost=' + encodeURIComponent(cost)+
                     '&hname=' +encodeURIComponent(hname)+
                     '&location=' +encodeURIComponent(location)+
                     '&imageUrl='+encodeURIComponent(imageUrl);
        window.location.href = url;
    };
 });

        var user = JSON.parse(localStorage.getItem("loggedUser"))
        var loginadd = document.getElementById("login-btn");
        console.log(user); 
        loginadd.innerHTML = user;
</script>

</body>
</html>
