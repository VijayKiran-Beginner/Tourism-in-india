    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('g10.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 40px;
            background: white;
            color: #f9a825;
            font-size: 3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .gallery {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .gallery img {
            margin: 10px;
            border-radius: 10px;
            width: 30%;
            height: auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.7);
        }

        .section-title {
            font-size: 2rem;
            margin-top: 50px;
            margin-bottom: 20px;
            text-align: center;
            color: #f9a825;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }

        .hotels, .places {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 20px;
        }

        .hotel-block, .place-block {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            overflow: hidden;
            margin: 20px;
            width: 30%;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hotel-block:hover, .place-block:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
        }

        .hotel-block img, .place-block img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 4px solid #f9a825;
        }

        .hotel-block h3, .place-block h3 {
            margin: 10px 0;
            font-size: 1.5rem;
            color: #333;
        }

        .hotel-block p, .place-block p {
            padding: 0 10px 20px;
            font-size: 1rem;
            color: #555;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            background-color: rgba(0, 0, 0, 0.9);
            color: #f9a825;
            font-size: 1.2rem;
        }
        .one
        {
            margin: 0;
            font-family:Arial, Helvetica, sans-serif;
        }

        .navbar a:hover

            color: orangered;
            background-color: rgba(0, 0, 0, 0.4);
            box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease 0s;
        }

        .navbar a:active
        {
            background-color: rgba(0, 0, 0, 0.6);
        }
