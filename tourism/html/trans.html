<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Transportation Cost Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f4f4;
            color: #333;
        }
        h1 {
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }
        label {
            font-weight: bold;
        }
        .required::after {
            content: '*';
            color: red;
            margin-left: 5px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .calculate-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #f57c00;
            color: white;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .calculate-btn:hover {
            background-color: #d56800;
        }
        .result {
            margin-top: 20px;
            font-size: 1.5rem;
            color: #f57c00;
            text-align: center;
        }
    </style>
</head>

    <h1> Transportation Cost Calculator</h1>

    <div class="container">
        <form id="transportForm">
            <!-- Departure Location -->
            <label for="fromLocation" class="required">From Location</label>
            <select id="fromLocation" required>
                <option value="">Select Location</option>
                <option value="NewDelhi">NewDelhi</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Kolkata">Kolkata</option>
                <option value="Bangalore">Bangalore</option>
                <option value="Chennai">Chennai</option>
                <option value="Hyderabad">Hyderabad</option>
                <option value="Ahmedabad">Ahmedabad</option>
                <option value="Pune">Pune</option>
                <option value="Jaipur">Jaipur</option>
                <option value="Lucknow">Lucknow</option>
                <option value="Kanpur">Kanpur</option>
                <option value="Surat">Surat</option>
                <option value="Patna">Patna</option>
                <option value="Bhopal">Bhopal</option>
                <option value="Agra">Agra</option>
            </select>

            <!-- Destination Location -->
            <label for="toLocation" class="required">To Location</label>
            <select id="toLocation" required>
                 <option value="">Select the destination:</option>
                <option value="Goa">Goa</option>
                <option value="Darjeeling">Darjeeling</option>
                <option value="Dwaraka">Dwaraka</option>
                <option value="Manali">Manali</option>
                <option value="Gujarat">Gujarat</option>
                <option value="Agra">Agra</option>
                <option value="Bangalore">Bangalore</option>
                <option value="NewDelhi">New delhi</option>
                <option value="Tirupathi">Tirupati</option>
                <option value="Chennai">Chennai</option>
            </select>

            <!-- Number of Passengers -->
            <label for="passengers" class="required">Number of Passengers</label>
            <input type="number" id="passengers" min="1" value="1" required>

            <!-- Button to calculate -->
            <button class="calculate-btn" type="submit">Calculate Cost</button>

            <!-- Display the result -->
            <div class="result" id="result">Result:</div>
        </form>
        
    </div>

        // Event listener for form submission
        document.getElementById('transportForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent the form from submitting

            // Get values from the form
            const fromLocation = document.getElementById('fromLocation').value;
            const toLocation = document.getElementById('toLocation').value;
            const passengers = parseInt(document.getElementById('passengers').value);

            // Check if all fields are filled
            if (!fromLocation || !toLocation || isNaN(passengers) || passengers < 1) {
                alert("Please fill out all fields with valid values.");
                return;
            }

            // Ensure the fromLocation and toLocation are not the same
            if (fromLocation === toLocation) {
                alert("Departure and destination locations cannot be the same.");
                return;
            }

            // Create a key to lookup cost from the dictionary
            const routeKey = fromLocation + '-' + toLocation; // String concatenation
            const reverseRouteKey = toLocation + '-' + fromLocation;

            // Calculate the cost
            let totalCost = 0;
            if (costPerPerson[routeKey] !== undefined) {
                totalCost = costPerPerson[routeKey] * passengers;
            } else if (costPerPerson[reverseRouteKey] !== undefined) {
                totalCost = costPerPerson[reverseRouteKey] * passengers;
            } else {
                alert("No direct train route found between these locations.");
                return;
            }

            // Display the result
            document.getElementById('result').textContent = totalCost;
        });
